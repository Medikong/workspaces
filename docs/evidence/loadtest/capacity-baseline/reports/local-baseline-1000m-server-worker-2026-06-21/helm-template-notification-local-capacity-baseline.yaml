apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "notification-customer-api"
  namespace: "ticketing-notification"
  labels:
    app.kubernetes.io/name: "notification-service"
    app.kubernetes.io/instance: "notification-local-capacity-baseline"
    app.kubernetes.io/part-of: medikong
  annotations:

    konghq.com/plugins: ticketing-jwt,ticketing-identity-headers,ticketing-role-customer,ticketing-rate-limit-notifications,ticketing-correlation-id,ticketing-prometheus
spec:
  ingressClassName: "kong"
  rules:
    -
      http:
        paths:
          - path: "/notifications"
            pathType: "Prefix"
            backend:
              service:
                name: "notification-service"
                port:
                  number: 8084
