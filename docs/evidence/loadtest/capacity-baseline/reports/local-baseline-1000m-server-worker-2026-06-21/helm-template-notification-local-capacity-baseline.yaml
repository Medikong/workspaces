# Source: medikong-service/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "notification-service"
  namespace: "ticketing-notification"
  labels:
    app.kubernetes.io/name: "notification-service"
    app.kubernetes.io/instance: "notification-local-capacity-baseline"
    app.kubernetes.io/managed-by: "Helm"
    app.kubernetes.io/part-of: medikong
    medikong.io/environment: "local-capacity-baseline"

    ticketing.io/service: notification
    ticketing.io/tier: api
spec:
  selector:
    matchLabels:
      app: "notification-service"
  strategy:

    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: "notification-service"
        app.kubernetes.io/name: "notification-service"
        app.kubernetes.io/instance: "notification-local-capacity-baseline"
        medikong.io/environment: "local-capacity-baseline"

        ticketing.io/service: notification
        ticketing.io/tier: api

        sidecar.istio.io/inject: "true"
      annotations:

        sidecar.istio.io/inject: "true"
        sidecar.istio.io/proxyCPU: 25m
        sidecar.istio.io/proxyCPULimit: 200m
        sidecar.istio.io/proxyMemory: 64Mi
        sidecar.istio.io/proxyMemoryLimit: 256Mi
    spec:
      serviceAccountName: "notification-service"
      automountServiceAccountToken: false
      containers:
        - name: "notification-service"
          image: "localhost:5001/notification-service:dev"
          imagePullPolicy: "Always"
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          env:

            - name: SERVICE_VERSION
              value: dev
            - name: SERVICE_ENVIRONMENT
              value: local-capacity-baseline
            - name: SQLALCHEMY_POOL_SIZE
              value: "35"
            - name: SQLALCHEMY_MAX_OVERFLOW
              value: "20"
            - name: SQLALCHEMY_POOL_TIMEOUT_SECONDS
              value: "15"
            - name: SQLALCHEMY_POOL_RECYCLE_SECONDS
              value: "1800"
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://opentelemetry-collector.observability.svc.cluster.local:4317
            - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
              value: /health,/healthz,/readyz,/metrics
            - name: PYROSCOPE_ENABLED
              value: "true"
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope.observability.svc.cluster.local:4040
            - name: PYROSCOPE_SAMPLE_RATE
              value: "25"
            - name: PYROSCOPE_SPAN_PROFILES_ENABLED
              value: "true"
            - name: PYROSCOPE_ONCPU
              value: "true"
            - name: PYROSCOPE_GIL_ONLY
              value: "true"
            - name: MONGODB_URL
              value: mongodb://notification-db:27017
            - name: MONGODB_DB_NAME
              value: notification_db
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.ticketing-messaging.svc.cluster.local:9092
            - name: KAFKA_GROUP_ID
              value: notification-service
            - name: RESERVATION_CREATED_TOPIC
              value: reservation-created
            - name: RESERVATION_EXPIRED_TOPIC
              value: reservation-expired
            - name: PAYMENT_APPROVED_TOPIC
              value: payment-approved
            - name: PAYMENT_FAILED_TOPIC
              value: payment-failed
            - name: TICKET_ISSUED_TOPIC
              value: ticket-issued
            - name: UVICORN_WORKERS
              value: "2"
          readinessProbe:

            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:

            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:

            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 1000m
              memory: 128Mi
          securityContext:

            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
