# Source: medikong-service/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-notification-service-ingress"
  namespace: "ticketing-notification"
  labels:
    app.kubernetes.io/name: "notification-service"
    app.kubernetes.io/instance: "notification-local-capacity-baseline"
    app.kubernetes.io/part-of: medikong
spec:
  podSelector:
    matchLabels:
      app: "notification-service"
  policyTypes:

    - Ingress
    - Egress
  ingress:

    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kong
      ports:
      - port: 8084
        protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "monitoring"
      ports:
        - protocol: TCP
          port: "http"
  egress:

    - ports:
      - port: 53
        protocol: UDP
      - port: 53
        protocol: TCP
      to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchLabels:
            k8s-app: kube-dns
    - ports:
      - port: 27017
        protocol: TCP
      to:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: notification-db
    - ports:
      - port: 9092
        protocol: TCP
      to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ticketing-messaging
        podSelector:
          matchLabels:
            app.kubernetes.io/name: kafka
    - ports:
      - port: 4317
        protocol: TCP
      - port: 4318
        protocol: TCP
      to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: observability
        podSelector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
    - ports:
      - port: 15012
        protocol: TCP
      - port: 15010
        protocol: TCP
      - port: 443
        protocol: TCP
      to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: istio-system
        podSelector:
          matchLabels:
            app: istiod
