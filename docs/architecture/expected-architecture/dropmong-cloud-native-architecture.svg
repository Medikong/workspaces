<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">DropMong cloud-native architecture</title>
  <desc id="desc">A new cloud-native DropMong architecture showing CI/CD, GitOps, Kubernetes runtime, application services, data and event systems, and observability without public cloud provisioning.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B3DF5"/>
      <stop offset="55%" stop-color="#7D5CFF"/>
      <stop offset="100%" stop-color="#B7A6FF"/>
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7AC2"/>
      <stop offset="100%" stop-color="#FF5E7D"/>
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F3FF"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-18%" width="130%" height="145%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#111827" flood-opacity="0.11"/>
    </filter>
    <filter id="tinyShadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5B3DF5"/>
    </marker>
    <marker id="arrowPink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#FF7AC2"/>
    </marker>
    <marker id="arrowInk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <style>
      text { font-family: "Apple SD Gothic Neo", "Pretendard", sans-serif; letter-spacing: 0; }
      .bg { fill: #FFFFFF; }
      .title { font-size: 54px; font-weight: 800; fill: #111827; }
      .subtitle { font-size: 22px; font-weight: 600; fill: #374151; }
      .eyebrow { font-size: 17px; font-weight: 800; fill: #5B3DF5; letter-spacing: 5px; }
      .section { font-size: 21px; font-weight: 800; fill: #5B3DF5; letter-spacing: 1.2px; }
      .cluster-title { font-size: 30px; font-weight: 800; fill: #111827; }
      .cluster-subtitle { font-size: 17px; font-weight: 600; fill: #687280; }
      .node-title { font-size: 21px; font-weight: 800; fill: #111827; }
      .node-body { font-size: 15px; font-weight: 600; fill: #687280; }
      .tiny { font-size: 13px; font-weight: 700; fill: #687280; }
      .white-title { font-size: 21px; font-weight: 800; fill: #FFFFFF; }
      .white-body { font-size: 15px; font-weight: 600; fill: #F5F2FF; }
      .legend { font-size: 15px; font-weight: 800; fill: #374151; }
      .card { fill: #FFFFFF; stroke: #E2E4F7; stroke-width: 1.6; rx: 16; filter: url(#tinyShadow); }
      .soft-card { fill: #F8F5FF; stroke: #D8CCFF; stroke-width: 1.8; rx: 16; filter: url(#tinyShadow); }
      .pink-card { fill: #FFF1F8; stroke: #FFB6D9; stroke-width: 1.8; rx: 16; filter: url(#tinyShadow); }
      .dark-card { fill: #111827; stroke: #111827; stroke-width: 1.8; rx: 16; filter: url(#tinyShadow); }
      .group { fill: #FFFFFF; stroke: #E2E4F7; stroke-width: 2; rx: 26; filter: url(#softShadow); }
      .group-soft { fill: url(#surfaceGradient); stroke: #D8CCFF; stroke-width: 2; rx: 28; filter: url(#softShadow); }
      .chip { fill: #F8F5FF; stroke: #D8CCFF; stroke-width: 1.4; rx: 13; }
      .line { fill: none; stroke: #5B3DF5; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowPurple); }
      .line-thin { fill: none; stroke: #5B3DF5; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowPurple); }
      .line-dark { fill: none; stroke: #111827; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowInk); }
      .event-line { fill: none; stroke: #FF7AC2; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 9; marker-end: url(#arrowPink); }
      .signal-line { fill: none; stroke: #B7A6FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 9; marker-end: url(#arrowPurple); }
    </style>
  </defs>

