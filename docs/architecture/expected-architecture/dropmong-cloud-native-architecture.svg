  <path d="M986 172H1030" class="line-dark"/>
  <path d="M1248 172H1292" class="line-dark"/>
  <path d="M1454 172H1498" class="line-dark"/>

  <rect x="540" y="260" width="1236" height="642" class="group-soft"/>
  <text x="584" y="314" class="cluster-title">Kubernetes Cluster</text>
  <text x="584" y="346" class="cluster-subtitle">Ingress, service mesh policy, candidate services, data/event systems, and telemetry collection</text>

  <rect x="584" y="386" width="220" height="94" class="pink-card"/>
  <text x="694" y="424" text-anchor="middle" class="node-title">사용자 / 운영자</text>
  <text x="694" y="454" text-anchor="middle" class="node-body">drop browse · order · admin</text>

  <rect x="876" y="370" width="346" height="124" class="group"/>
  <text x="1049" y="414" text-anchor="middle" class="section">EDGE &amp; TRAFFIC</text>
  <rect x="916" y="438" width="132" height="42" rx="10" fill="#5B3DF5"/>
  <text x="982" y="465" text-anchor="middle" class="white-body">Ingress</text>
  <rect x="1070" y="438" width="112" height="42" rx="10" fill="#FFFFFF" stroke="#B7A6FF" stroke-width="2"/>
  <text x="1126" y="457" text-anchor="middle" class="tiny">VirtualService</text>
  <text x="1126" y="474" text-anchor="middle" class="tiny">Retry · Canary</text>

  <rect x="1310" y="370" width="390" height="124" class="group"/>
  <text x="1505" y="414" text-anchor="middle" class="section">DEPLOYMENT UNITS</text>
  <rect x="1350" y="438" width="132" height="42" rx="10" fill="#FFFFFF" stroke="#D8CCFF" stroke-width="2"/>
  <text x="1416" y="465" text-anchor="middle" class="node-body">Helm Chart</text>
  <rect x="1506" y="438" width="154" height="42" rx="10" fill="#FFFFFF" stroke="#D8CCFF" stroke-width="2"/>
  <text x="1583" y="465" text-anchor="middle" class="node-body">K8s Manifests</text>

  <rect x="584" y="546" width="700" height="170" class="group"/>
  <text x="934" y="592" text-anchor="middle" class="section">APPLICATION SERVICES</text>
  <rect x="622" y="626" width="108" height="58" class="soft-card"/>
  <text x="676" y="660" text-anchor="middle" class="node-title">auth</text>
  <rect x="756" y="626" width="122" height="58" class="soft-card"/>
  <text x="817" y="660" text-anchor="middle" class="node-title">catalog</text>
  <rect x="904" y="626" width="112" height="58" class="pink-card"/>
  <text x="960" y="660" text-anchor="middle" class="node-title">order</text>
  <rect x="1042" y="626" width="124" height="58" class="soft-card"/>
  <text x="1104" y="660" text-anchor="middle" class="node-title">payment</text>
  <rect x="1192" y="626" width="58" height="58" class="dark-card"/>
  <text x="1221" y="660" text-anchor="middle" class="white-title">noti</text>

  <rect x="1350" y="546" width="350" height="170" class="group"/>
  <text x="1525" y="592" text-anchor="middle" class="section">DATA &amp; EVENTS</text>
  <rect x="1388" y="626" width="116" height="58" class="card"/>
  <text x="1446" y="651" text-anchor="middle" class="node-title">PostgreSQL</text>
  <text x="1446" y="672" text-anchor="middle" class="tiny">service DB</text>
