  <rect x="1630" y="626" width="42" height="58" rx="12" fill="url(#pinkGradient)"/>
  <text x="1651" y="660" text-anchor="middle" class="white-title">K</text>

  <rect x="584" y="768" width="1116" height="92" class="group"/>
  <text x="624" y="823" class="section">OBSERVABILITY</text>
