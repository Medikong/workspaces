  <path d="M0 800C210 720 260 900 470 845C720 780 850 742 1110 778C1390 816 1590 720 1920 668V1080H0Z" fill="#F6F1FF"/>
  <path d="M1630 0C1530 104 1492 192 1494 330C1496 450 1562 554 1680 594C1768 624 1846 606 1920 552V0Z" fill="#EFE8FF"/>
  <circle cx="1768" cy="162" r="46" fill="url(#brandGradient)" opacity="0.82"/>
  <circle cx="1128" cy="175" r="18" fill="#7D5CFF" opacity="0.78"/>
  <path d="M1128 132C1138 158 1145 165 1171 175C1145 185 1138 192 1128 218C1118 192 1111 185 1085 175C1111 165 1118 158 1128 132Z" fill="#7D5CFF" opacity="0.82"/>
  <path d="M164 170L224 135L284 170V240L224 275L164 240Z" fill="url(#brandGradient)" opacity="0.96"/>
  <path d="M224 135V204L164 240V170Z" fill="#7D5CFF" opacity="0.74"/>
  <path d="M224 204L284 170V240L224 275Z" fill="#3E18D6" opacity="0.72"/>
  <path d="M197 185L224 169L252 185V220L224 237L197 220Z" fill="#FFFFFF" opacity="0.92"/>

  <text x="326" y="178" class="title" style="font-size:38px;">DropMong</text>
  <text x="326" y="222" class="eyebrow">CLOUD NATIVE ARCHITECTURE</text>
  <text x="88" y="316" class="title">쿠버네티스 기반</text>
  <text x="88" y="382" class="title">운영 아키텍처</text>
  <text x="92" y="434" class="subtitle">서비스, CI/CD, 관측성을 하나의</text>
  <text x="92" y="468" class="subtitle">클라우드 네이티브 런타임으로 정리합니다.</text>

  <rect x="88" y="480" width="148" height="38" rx="9" fill="#5B3DF5"/>
  <text x="162" y="505" text-anchor="middle" class="white-body">Kubernetes</text>
  <rect x="248" y="480" width="96" height="38" rx="9" fill="#111827"/>
  <text x="296" y="505" text-anchor="middle" class="white-body">CI/CD</text>
  <rect x="356" y="480" width="118" height="38" rx="9" fill="url(#pinkGradient)"/>
  <text x="415" y="505" text-anchor="middle" class="white-body">Observability</text>

  <rect x="76" y="720" width="378" height="210" class="group-soft"/>
  <text x="112" y="770" class="section">ARCHITECTURE SCOPE</text>
  <text x="112" y="818" class="node-title">포함</text>
  <text x="112" y="850" class="node-body">서비스 런타임 · 배포 동기화 · 트래픽 정책</text>
  <text x="112" y="885" class="node-body">메트릭 · 로그 · 트레이스 · 알림</text>
  <text x="112" y="922" class="node-title">제외</text>
  <text x="166" y="922" class="node-body">Terraform, VPC, managed cloud provisioning</text>

  <rect x="540" y="72" width="1236" height="132" class="group"/>
  <text x="580" y="122" class="section">01 CI/CD &amp; GITOPS DELIVERY</text>
  <rect x="580" y="146" width="154" height="52" class="soft-card"/>
  <text x="657" y="178" text-anchor="middle" class="node-title">GitHub</text>
  <rect x="784" y="146" width="202" height="52" class="card"/>
  <text x="885" y="170" text-anchor="middle" class="node-title">GitHub Actions</text>
  <text x="885" y="190" text-anchor="middle" class="tiny">test · build · scan</text>
  <rect x="1036" y="146" width="212" height="52" class="card"/>
  <text x="1142" y="170" text-anchor="middle" class="node-title">Container Registry</text>
  <text x="1142" y="190" text-anchor="middle" class="tiny">service images</text>
  <rect x="1298" y="146" width="156" height="52" class="dark-card"/>
  <text x="1376" y="178" text-anchor="middle" class="white-title">GitOps Repo</text>
  <rect x="1504" y="146" width="184" height="52" class="soft-card"/>
  <text x="1596" y="170" text-anchor="middle" class="node-title">Argo CD</text>
  <text x="1596" y="190" text-anchor="middle" class="tiny">sync desired state</text>
