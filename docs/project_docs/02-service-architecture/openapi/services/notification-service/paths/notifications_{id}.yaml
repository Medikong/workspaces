get:
  summary: 알림 단건 조회
  operationId: getNotification
  description: 로그인한 사용자 본인의 알림 단건을 조회한다. 타인의 알림은 403을 반환한다.
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/RequestId
    - $ref: ../../../common/components.yaml#/components/parameters/Id
  responses:
    "200":
      description: 알림 단건 반환 성공.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/Notification
          example:
            id: "664f1a2b3c4d5e6f7a8b9c0d"
            userId: 1
            type: ticket-issued
            message: "티켓이 발행되었습니다. 티켓 ID: ticket-1"
            status: CREATED
            sourceId: ticket-1
            metadata:
              ticket_id: ticket-1
              reservation_id: reservation-1
            createdAt: "2026-05-13T10:15:00Z"
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "403":
      $ref: ../../../common/components.yaml#/components/responses/Forbidden
    "404":
      $ref: ../../../common/components.yaml#/components/responses/NotFound
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
