get:
  summary: 내 티켓 목록 조회
  operationId: listMyTickets
  description: 로그인한 사용자 본인의 티켓 목록을 cursor 기반 페이지 단위로 반환한다. 기본 limit은 20, 최대 limit은 100이다.
  parameters:
    - $ref: ../../../common/components.yaml#/components/parameters/RequestId
    - $ref: ../../../common/components.yaml#/components/parameters/Limit
    - $ref: ../../../common/components.yaml#/components/parameters/Cursor
  responses:
    "200":
      description: 티켓 목록 반환 성공.
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/TicketListResponse
          example:
            items:
              - id: 1
                reservationId: reservation-1
                userId: 1
                concertId: concert-1
                seatId: seat-A1
                status: ISSUED
                qrUrl: "https://ticketing-tickets.s3.ap-northeast-2.amazonaws.com/tickets/1/qr.png"
                pdfUrl: "https://ticketing-tickets.s3.ap-northeast-2.amazonaws.com/tickets/1/ticket.pdf"
                issuedAt: "2026-05-13T10:00:00Z"
            nextCursor: "1"
    "401":
      $ref: ../../../common/components.yaml#/components/responses/Unauthorized
    "500":
      $ref: ../../../common/components.yaml#/components/responses/InternalServerError
