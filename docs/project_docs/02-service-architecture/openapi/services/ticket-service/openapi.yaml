openapi: 3.1.0
info:
  title: ticket-service API
  version: 0.1.0
  description: |
    payment-approved 이벤트 수신 후 티켓을 발행하고 QR/PDF를 S3에 저장하는 서비스.
    티켓 발행 후 ticket-issued 이벤트를 Kafka로 발행한다.

servers:
  - url: http://localhost:8085
    description: local

security:
  - BearerAuth: []

paths:
  /tickets/issue:
    $ref: ./paths/tickets_issue.yaml
  /tickets/me:
    $ref: ./paths/tickets_me.yaml
  /tickets/{id}:
    $ref: ./paths/tickets_{id}.yaml

components:
  securitySchemes:
    BearerAuth:
      $ref: ../../common/components.yaml#/components/securitySchemes/BearerAuth

  schemas:
    TicketIssueRequest:
      type: object
      required:
        - reservationId
        - userId
        - concertId
        - seatId
      properties:
        reservationId:
          type: string
          examples:
            - reservation-1
        userId:
          type: integer
          examples:
            - 1
        concertId:
          type: string
          examples:
            - concert-1
        seatId:
          type: string
          examples:
            - seat-A1

    Ticket:
      type: object
      required:
        - id
        - reservationId
        - userId
        - concertId
        - seatId
        - status
        - issuedAt
      properties:
        id:
          type: integer
          examples:
            - 1
        reservationId:
          type: string
          examples:
            - reservation-1
        userId:
          type: integer
          examples:
            - 1
        concertId:
          type: string
          examples:
            - concert-1
        seatId:
          type: string
          examples:
            - seat-A1
        status:
          type: string
          enum:
            - ISSUED
          examples:
            - ISSUED
        qrUrl:
          type:
            - string
            - "null"
          examples:
            - https://ticketing-tickets.s3.ap-northeast-2.amazonaws.com/tickets/1/qr.png
        pdfUrl:
          type:
            - string
            - "null"
          examples:
            - https://ticketing-tickets.s3.ap-northeast-2.amazonaws.com/tickets/1/ticket.pdf
        issuedAt:
          type: string
          format: date-time
          examples:
            - "2026-05-13T10:00:00Z"

    TicketListResponse:
      type: object
      required:
        - items
        - nextCursor
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        nextCursor:
          type:
            - string
            - "null"
          description: Cursor for the next page. Null means there are no more tickets for this user.
          examples:
            - "123"
